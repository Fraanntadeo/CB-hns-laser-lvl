; levels.ini - Configuración de niveles para HNS + LVL
; Mantener este archivo en addons/amxmodx/configs/
; Valores básicos y fórmula de ejemplo para convertir FRAGS -> NIVELES

; Nivel máximo permitido
max_level = 150

; Fórmula configurable (explicada):
; - base_frags: frags mínimos requeridos para el primer nivel
; - per_level: incremento lineal por nivel
; - by_rango_multiplier: multiplicador adicional basado en el rango (si aplica)
; La lógica real será aplicada por el módulo `levels` y puede usar estos parámetros.

base_frags = 10
per_level = 2
by_rango_multiplier = 1.0

; Opciones de balance (ejemplos)
; cada_cuantos_niveles_aumenta = incremento extra por cada X niveles (compatibilidad con código legacy)
cada_cuantos_niveles_aumenta = 60
incremento_por_bloque = 1

; Ejemplo: la implementación podría usar:
; frags_requeridos = (base_frags + level * per_level) * by_rango_multiplier + (level / cada_cuantos_niveles_aumenta) * incremento_por_bloque

; NOTA: No editar si no se entiende la fórmula. Valores por defecto pensados para empezar.
